name: Extract and Commit ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  extract_and_commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download ZIP file
        run: |
          curl -L -o latestworld-v2-final.zip https://github.com/Sathish-chilumula/latestworld/raw/main/latestworld-v2-final.zip

      - name: Extract ZIP file
        run: |
          unzip -o latestworld-v2-final.zip -d ./

      - name: Remove ZIP file
        run: |
          rm latestworld-v2-final.zip

      - name: Commit and push extracted files
        run: |
          git config --global user.email "chilumulas62@gmail.com"
          git config --global user.name "Sathish-chilumula"
          git add .
          git commit -m "Extract files from latestworld-v2-final.zip" || echo "No changes to commit"
          git push origin main

name: Update News & Startups

on:
  schedule:
    - cron: '30 */6 * * *'   # Every 6 hours (offset by 30min from crypto)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - name: Update tech news
        run: npx ts-node --project tsconfig.scripts.json scripts/techNewsUpdate.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      - name: Update startup news
        run: npx ts-node --project tsconfig.scripts.json scripts/startupNewsUpdate.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
      - name: Trigger Cloudflare Pages rebuild
        if: success()
        run: curl -X POST "${{ secrets.CLOUDFLARE_PAGES_DEPLOY_HOOK }}"

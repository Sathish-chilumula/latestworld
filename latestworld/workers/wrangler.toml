name = "latestworld-cron"
main = "cron-worker.js"
compatibility_date = "2024-01-01"

[triggers]
crons = [
  "0 */6 * * *",
  "0 */12 * * *",
  "0 0 * * *"
]

# Environment variables are set in Cloudflare dashboard
# DO NOT put real keys here
[vars]
WORKER_SECRET = "set-this-in-cloudflare-dashboard"
